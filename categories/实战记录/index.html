                let currentYear = 2024; // 当前年份

                // 获取热力图颜色
                function getHeatmapColor(count) {
                    if (count < 1) {
                        return 'rgb(224,224,224)';  // 灰色，表示文章数量少
                    } else if (count <= 5) {
                        return 'rgb(102,255,178)';  // 浅绿色，表示中等文章数量
                    } else if (count <= 10) {
                        return 'rgb(0, 255, 128)';  // 中绿色，表示文章数量较多
                    } else {
                        return 'rgb(0,153,76)';  // 更深的绿色
                    }
                }

                // 渲染热力图
                document.addEventListener("DOMContentLoaded", function() {
                    renderHeatmap(currentYear);  // 初始渲染当前年份的热力图
                    // 同步年份选择器高度和热力图高度
                    syncHeight();
                });

                // 切换年份并更新热力图
                function updateHeatmap(year) {
                    currentYear = year;
                    const activeItems = document.getElementsByClassName('tab-item active');
                    for (let i = 0; i < activeItems.length; i++) {
                        activeItems[i].classList.remove('active');
                    }
                    document.getElementById('tab-item-' + year).classList.add('active');

                    renderHeatmap(year);  // 渲染新的年份热力图
                    // 同步年份选择器和热力图的高度
                    syncHeight();
                }

                // 渲染指定年份的热力图
                function renderHeatmap(year) {
                    const grid = document.querySelector(".heatmap-grid");
                    grid.innerHTML = ''; // 清空当前热力图

                    const dataForYear = heatmapData[year];

                    dataForYear.forEach(data => {
                        const cell = document.createElement("div");
                        cell.classList.add("heatmap-cell");
                        cell.title = `[${data.date}] ${data.count}篇`; // 鼠标悬停显示日期和文章数量
                        cell.style.backgroundColor = getHeatmapColor(data.count); // 设置背景颜色
                        cell.dataset.day = data.day; // 存储日期信息，以便后续更新时对比
                        cell.dataset.url ="/archives/" + year + "/" + data.date.split("-")[1] + "/";
                        // 点击单元格时跳转
                        if(data.count > 0){
                            cell.addEventListener('click', function () {
                            const url = cell.dataset.url;  // 获取跳转链接
                            window.location.href = url;    // 跳转到目标链接
                        });
                        }
                        grid.appendChild(cell);
                    });
                }

                // 同步年份选择器和热力图的高度
                function syncHeight() {
                    const heatmap = document.querySelector(".heatmap");
                    const yearSelector = document.querySelector(".year-selector");

                    const heatmapHeight = heatmap.offsetHeight;

                    yearSelector.style.height = heatmapHeight + 'px';
                }

                // 在窗口大小变化时同步高度
                window.addEventListener("resize", syncHeight);
            </script>
